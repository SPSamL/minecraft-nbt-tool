name: Release Cross-Platform Executables

on:
  push:
    tags:
      - v*
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.rid }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            rid: win-x64
            executable: minecraft-nbt-tool.exe
          - os: ubuntu-latest
            rid: linux-x64
            executable: minecraft-nbt-tool
          - os: ubuntu-latest
            rid: linux-arm64
            executable: minecraft-nbt-tool
          - os: macos-latest
            rid: osx-x64
            executable: minecraft-nbt-tool
          - os: macos-latest
            rid: osx-arm64
            executable: minecraft-nbt-tool

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore minecraft-nbt-tool.csproj

      - name: Publish
        run: dotnet publish minecraft-nbt-tool.csproj -c Release -r ${{ matrix.rid }} --self-contained true -p:PublishSingleFile=true -p:IncludeNativeLibrariesForSelfExtract=true -p:DebugType=None -o publish/${{ matrix.rid }}

      - name: Package release zip
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path dist -Force | Out-Null
          $version = if ("${{ github.ref_type }}" -eq "tag") { "${{ github.ref_name }}" } else { "manual-${{ github.run_number }}" }
          $packageRoot = "dist/minecraft-nbt-tool-${{ matrix.rid }}"
          New-Item -ItemType Directory -Path $packageRoot -Force | Out-Null
          Copy-Item "publish/${{ matrix.rid }}/${{ matrix.executable }}" "$packageRoot/${{ matrix.executable }}" -Force
          Copy-Item "README.md" "$packageRoot/README.md" -Force
          Compress-Archive -Path "$packageRoot/*" -DestinationPath "dist/minecraft-nbt-tool-$version-${{ matrix.rid }}.zip" -Force

      - name: Upload packaged artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.rid }}
          path: dist/*.zip
          if-no-files-found: error

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download all packaged artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          pattern: release-*
          merge-multiple: true

      - name: Generate release metadata
        id: release_meta
        shell: bash
        run: |
          if [ "${{ github.ref_type }}" = "tag" ]; then
            echo "tag=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
            echo "name=minecraft-nbt-tool ${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
          else
            echo "tag=manual-${{ github.run_number }}" >> "$GITHUB_OUTPUT"
            echo "name=minecraft-nbt-tool manual-${{ github.run_number }}" >> "$GITHUB_OUTPUT"
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Create or update release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release_meta.outputs.tag }}
          name: ${{ steps.release_meta.outputs.name }}
          prerelease: ${{ steps.release_meta.outputs.prerelease }}
          files: release-assets/*.zip
